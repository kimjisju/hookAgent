<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>hookAgent Control Panel</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="layout">
      <section class="sidebar">
        <div class="panel">
          <h1>hookAgent</h1>
          <p class="muted">Claude 훅 이벤트와 도구 승인 상태를 실시간으로 추적합니다.</p>
        </div>
        <div class="panel">
          <div class="section-header">
            <h2>승인 대기</h2>
            <span id="approval-count" class="badge">0</span>
          </div>
          <div id="approvals" class="stack empty">대기 중인 도구 요청이 없습니다.</div>
        </div>
        <div class="panel grow">
          <div class="section-header">
            <h2>세션</h2>
            <button id="refresh" type="button">새로고침</button>
          </div>
          <div id="sessions" class="stack empty">세션이 없습니다.</div>
        </div>
      </section>
      <section class="content">
        <div class="panel hero">
          <h2 id="session-title">세션을 선택하세요</h2>
          <p id="session-meta" class="muted">실시간 타임라인이 여기에 표시됩니다.</p>
        </div>
        <div class="panel grow">
          <div class="section-header">
            <h2>타임라인</h2>
            <span id="live-status" class="live">LIVE</span>
          </div>
          <div id="timeline" class="timeline empty">아직 표시할 이벤트가 없습니다.</div>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
